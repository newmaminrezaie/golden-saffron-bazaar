<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="petal" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="60%" stop-color="#7e3af2"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
    <linearGradient id="thread" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
  </defs>
  <!-- petals -->
  <g transform="translate(32 34)">
    <ellipse cx="0" cy="-14" rx="8" ry="16" fill="url(#petal)"/>
    <ellipse cx="0" cy="-14" rx="8" ry="16" fill="url(#petal)" transform="rotate(60)"/>
    <ellipse cx="0" cy="-14" rx="8" ry="16" fill="url(#petal)" transform="rotate(-60)"/>
    <ellipse cx="0" cy="-14" rx="7" ry="15" fill="url(#petal)" transform="rotate(120)" opacity="0.9"/>
    <ellipse cx="0" cy="-14" rx="7" ry="15" fill="url(#petal)" transform="rotate(-120)" opacity="0.9"/>
    <ellipse cx="0" cy="-14" rx="7" ry="15" fill="url(#petal)" transform="rotate(180)" opacity="0.85"/>
    <!-- saffron threads -->
    <path d="M0 0 C -2 -6 -4 -12 -3 -18" stroke="url(#thread)" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <path d="M0 0 C 0 -7 0 -14 0 -20" stroke="url(#thread)" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <path d="M0 0 C 2 -6 4 -12 3 -18" stroke="url(#thread)" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <circle cx="0" cy="0" r="2.2" fill="#fbbf24"/>
  </g>
</svg>
